# ============================================================
# L et Lui Signature — Configuration Netlify
# ============================================================

# Netlify Image CDN — transformation WebP automatique pour images externes
[images]
  remote_images = ["https://lh3\\.googleusercontent\\.com/.*"]

# Cache long terme pour les assets statiques (images, CSS, JS)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/produits.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# HTML : toujours frais (le shell HTML est léger, les données viennent du cache JS)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Compression activée automatiquement par Netlify (gzip/brotli)
[build]
  publish = "."
